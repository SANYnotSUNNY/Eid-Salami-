<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Eid Salami 💸</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0b0c2a, #1c1c4f);
    color: #fff;
    text-align: center;
    overflow-x: hidden;
    padding: 20px;
  }

  h1 {
    font-size: 3em;
    margin-bottom: 0;
    text-shadow: 0 0 10px #ffd700, 0 0 20px #ff8c00, 0 0 30px #ff4500;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #ffd700,0 0 20px #ff8c00,0 0 30px #ff4500; }
    to   { text-shadow: 0 0 20px #ffff00,0 0 30px #ffa500,0 0 40px #ff6347; }
  }

  p.subtitle {
    font-size: 1.2em;
    margin-bottom: 40px;
  }

  .card {
    background: #fff;
    color: #000;
    border-radius: 12px;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    position: relative;
  }

  .method-name {
    font-size: 1.5em;
    margin-bottom: 10px;
    font-weight: bold;
  }

  button {
    background: red;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1em;
  }

  #moon {
    position: fixed;
    top: 50px;
    left: -100px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle at 30% 30%, #fff, transparent 70%);
    border-radius: 50%;
    animation: moveMoon 20s linear infinite;
    z-index: 1;
  }

  @keyframes moveMoon {
    0% { left: -100px; top: 50px; transform: rotate(0deg); }
    50% { left: 50%; top: 100px; transform: rotate(180deg); }
    100% { left: 100%; top: 50px; transform: rotate(360deg); }
  }

  /* Male dancer */
  #dancer {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 3em;
    animation: dance 1s infinite alternate;
  }

  @keyframes dance {
    0% { transform: rotate(0deg) translateY(0); }
    50% { transform: rotate(20deg) translateY(-10px); }
    100% { transform: rotate(-20deg) translateY(0); }
  }

  /* Coins/cash animation */
  .coin {
    position: fixed;
    font-size: 24px;
    pointer-events: none;
    z-index: 9999;
    animation: fall 1s linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity:1; }
    100% { transform: translateY(300px) rotate(360deg); opacity:0; }
  }

  #fireworks {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9998;
  }

  .sparkle {
    position: fixed;
    width: 5px;
    height: 5px;
    background: yellow;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkleAnim 2s linear infinite;
  }

  @keyframes sparkleAnim {
    0% { transform: translateY(0) scale(1); opacity:1; }
    50% { transform: translateY(-50px) scale(1.5); opacity:0.5; }
    100% { transform: translateY(0) scale(1); opacity:1; }
  }
</style>
</head>
<body>

<div id="moon"></div>
<h1>Eid Mubarak 🌙</h1>
<p class="subtitle">Make me rich with your Eid Salami 😎💸</p>

<!-- Hidden numbers -->
<div style="display:none;">
  <span id="number1">01786820342</span>
  <span id="number2">01786820342</span>
  <span id="number3">01786820342</span>
  <span id="number4">01786820342</span>
</div>

<!-- Copy buttons -->
<div class="card">
  <div class="method-name">bKash</div>
  <button onclick="copyNumber('number1')">Copy Number</button>
</div>

<div class="card">
  <div class="method-name">Nagad</div>
  <button onclick="copyNumber('number2')">Copy Number</button>
</div>

<div class="card">
  <div class="method-name">Rocket</div>
  <button onclick="copyNumber('number3')">Copy Number</button>
</div>

<div class="card">
  <div class="method-name">Upay</div>
  <button onclick="copyNumber('number4')">Copy Number</button>
</div>

<canvas id="fireworks"></canvas>
<div id="dancer">🕺</div>

<script>
function copyNumber(id) {
  const number = document.getElementById(id).innerText;
  navigator.clipboard.writeText(number).then(() => {
    alert("Number copied! 💰💵 Fireworks incoming!");
    triggerFireworks();
    createSparkles();
    triggerCoins();
    const dancer = document.getElementById('dancer');
    dancer.style.animation = 'dance 0.3s infinite alternate';
    setTimeout(()=> dancer.style.animation='dance 1s infinite alternate',1000);
  });
}

// Coins/cash animation
function triggerCoins() {
  const emojis = ['💰','💵','🪙','💎'];
  for(let i=0;i<20;i++){
    const coin=document.createElement('div');
    coin.className='coin';
    coin.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    coin.style.left=Math.random()*(window.innerWidth-30)+'px';
    coin.style.top='0px'; // start from top
    coin.style.fontSize=(16+Math.random()*24)+'px';
    document.body.appendChild(coin);
    setTimeout(()=>coin.remove(),1000);
  }
}

// Sparkles effect
function createSparkles(){
  for(let i=0;i<10;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.style.left=Math.random()*window.innerWidth+'px';
    s.style.top=Math.random()*window.innerHeight+'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
  }
}

// Fireworks canvas
const canvas=document.getElementById('fireworks');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
function triggerFireworks(){
  const x=Math.random()*canvas.width;
  const y=Math.random()*canvas.height/2;
  for(let i=0;i<30;i++){
    particles.push({
      x:x,
      y:y,
      vx:(Math.random()-0.5)*10,
      vy:(Math.random()-0.5)*10,
      alpha:1,
      color:`hsl(${Math.random()*360},100%,50%)`
    });
  }
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.alpha-=0.02;
    ctx.fillStyle=`hsla(${Math.random()*360},100%,50%,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fill();
    if(p.alpha<=0) particles.splice(i,1);
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
